# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

input_boolean:
  pid_mode:
    name: PID Modus (STEER)
    icon: mdi:fan-auto

sensor:
  - platform: statistics
    name: "CO2 alpstuga 2 smooth"
    entity_id: sensor.alpstuga_air_quality_2_co2
    state_characteristic: mean
    max_age:
      minutes: 4
    sampling_size: 40
  - platform: statistics
    name: "CO2 alpstuga 1 smooth"
    entity_id: sensor.alpstuga_air_quality_moni_co2
    state_characteristic: mean
    max_age:
      minutes: 4
    sampling_size: 40

template:
  - sensor:
      - name: "CO2 worst room"
        unit_of_measurement: "ppm"
        state: >
          {{ [
            states('sensor.co2_alpstuga_1_smooth') | float(0),
            states('sensor.co2_alpstuga_2_smooth') | float(0)
          ] | max | round(0) | int }}

      - name: "Fan speed target"
        unit_of_measurement: "%"
        state: >
          {% set ppm     = states('sensor.co2_worst_room') | float(0) %}
          {% set ppm_max = 2000 %}
          {{ [(ppm / ppm_max * 100), 100] | min | round(1) }}

  - sensor:
      - name: "Ventilatie signaal"
        unit_of_measurement: "%"
        state: >
          {% set b = state_attr('light.shelly0110dimg3_REPLACE_ME', 'brightness') %}
          {% if b is not none %}
            {{ (b / 255 * 100) | round(0) }}
          {% else %}
            0
          {% endif %}

      - name: "PID Error"
        unit_of_measurement: "ppm"
        state: "{{ (states('sensor.co2_worst_room') | float(0)) - (states('input_number.pid_setpoint') | float(800)) }}"

      - name: "PID Output"
        unit_of_measurement: "%"
        state: "{{ states('input_number.pid_previous_output') | float(0) | round(1) }}"

      - name: "PID Integral"
        state: "{{ states('input_number.pid_integral') | float(0) | round(1) }}"

      - name: "Debiet vraag"
        unit_of_measurement: "m³/h"
        state: >
          {% set pct = states('sensor.pid_output') | float(0) %}
          {{ (200 + pct / 100 * 250) | round(0) }}

input_number:
  pid_setpoint:
    name: CO2 Setpoint
    min: 425
    max: 1200
    step: 25
    initial: 950
    unit_of_measurement: "ppm"

  pid_kp:
    name: PID Kp
    min: 0
    max: 5
    step: 0.01
    initial: 0.15
    mode: box

  pid_ki:
    name: PID Ki
    min: 0
    max: 0.5
    step: 0.001
    initial: 0.02
    mode: box

  pid_kd:
    name: PID Kd
    min: 0
    max: 5
    step: 0.01
    initial: 0.0
    mode: box

  pid_integral:
    name: PID Integral
    min: 0
    max: 4000
    step: 0.01
    initial: 0
    mode: box

  pid_previous_error:
    name: PID Previous Error
    min: -2000
    max: 2000
    step: 0.01
    initial: 0
    mode: box

  pid_previous_output:
    name: PID Previous Output
    min: 0
    max: 100
    step: 0.01
    initial: 0
    mode: box
